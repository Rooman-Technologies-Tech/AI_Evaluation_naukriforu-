AWSTemplateFormatVersion: '2010-09-09'
Description: 'Recruitment Portal Development Infrastructure - RDS + Ollama (AWS Documentation Compliant)'

Parameters:
  Environment:
    Type: String
    Default: development
    AllowedValues: [development, staging, production]
  
  DatabasePassword:
    Type: String
    NoEcho: true
    Description: Password for RDS database
    MinLength: 8
    MaxLength: 128
  
  OllamaModel:
    Type: String
    Default: llama2
    Description: Ollama model to deploy

Resources:
  # VPC
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub '${Environment}-recruitment-portal-vpc'

  # Public Subnets (2 AZs)
  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub '${Environment}-public-subnet-1'

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub '${Environment}-public-subnet-2'

  # Private Subnets (2 AZs for RDS)
  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.3.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub '${Environment}-private-subnet-1'

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.4.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub '${Environment}-private-subnet-2'

  # Internet Gateway
  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub '${Environment}-internet-gateway'

  InternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref InternetGateway
      VpcId: !Ref VPC

  # NAT Gateway
  ElasticIP:
    Type: AWS::EC2::EIP
    DependsOn: InternetGatewayAttachment
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub '${Environment}-nat-eip'

  NATGateway:
    Type: AWS::EC2::NatGateway
    DependsOn: InternetGatewayAttachment
    Properties:
      AllocationId: !GetAtt ElasticIP.AllocationId
      SubnetId: !Ref PublicSubnet1
      Tags:
        - Key: Name
          Value: !Sub '${Environment}-nat-gateway'

  # Route Tables
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub '${Environment}-public-route-table'

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub '${Environment}-private-route-table'

  PrivateRoute:
    Type: AWS::EC2::Route
    DependsOn: NATGateway
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NATGateway

  PrivateSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet1
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet2
      RouteTableId: !Ref PrivateRouteTable

  # Security Groups
  DatabaseSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for RDS PostgreSQL
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          CidrIp: 0.0.0.0/0  # Allow from anywhere for development
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref OllamaSecurityGroup  # Also allow from Ollama instance
      Tags:
        - Key: Name
          Value: !Sub '${Environment}-database-sg'

  OllamaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Ollama EC2 instance
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 11434
          ToPort: 11434
          CidrIp: 0.0.0.0/0  # Allow from anywhere for development
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0  # SSH access for development
      Tags:
        - Key: Name
          Value: !Sub '${Environment}-ollama-sg'

  # RDS PostgreSQL
  DatabaseSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnet group for RDS PostgreSQL
      SubnetIds:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      Tags:
        - Key: Name
          Value: !Sub '${Environment}-database-subnet-group'

  DatabaseInstance:
    Type: AWS::RDS::DBInstance
    DependsOn: DatabaseSubnetGroup
    Properties:
      DBInstanceIdentifier: !Sub '${Environment}-recruitment-portal-db'
      DBInstanceClass: db.t3.micro
      Engine: postgres
      EngineVersion: '17.4'  # More stable version
      AllocatedStorage: 20
      StorageType: gp2
      MasterUsername: postgres
      MasterUserPassword: !Ref DatabasePassword
      DBName: recruitment_portal
      VPCSecurityGroups:
        - !Ref DatabaseSecurityGroup
      DBSubnetGroupName: !Ref DatabaseSubnetGroup
      BackupRetentionPeriod: 7
      MultiAZ: false
      PubliclyAccessible: true   # Enable for development access
      DeletionProtection: false
      Tags:
        - Key: Name
          Value: !Sub '${Environment}-recruitment-portal-db'

  # DynamoDB Tables
  SearchIndexTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${Environment}-search-indexes'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: candidate_id
          AttributeType: S
        - AttributeName: search_type
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: CandidateSearchIndex
          KeySchema:
            - AttributeName: candidate_id
              KeyType: HASH
            - AttributeName: search_type
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Name
          Value: !Sub '${Environment}-search-indexes'

  AnalyticsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${Environment}-analytics'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: date
          AttributeType: S
        - AttributeName: metric_type
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: DateMetricIndex
          KeySchema:
            - AttributeName: date
              KeyType: HASH
            - AttributeName: metric_type
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Name
          Value: !Sub '${Environment}-analytics'

  # S3 Bucket for Resume Storage
  ResumeStorageBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${Environment}-recruitment-portal-resumes-${AWS::AccountId}'
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Name
          Value: !Sub '${Environment}-resume-storage'

  # IAM Role for Ollama Instance
  OllamaInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${Environment}-ollama-instance-role-${AWS::AccountId}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  OllamaInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub '${Environment}-ollama-instance-profile-${AWS::AccountId}'
      Roles:
        - !Ref OllamaInstanceRole

  # Key Pair for EC2
  KeyPairName:
    Type: AWS::EC2::KeyPair
    Properties:
      KeyName: !Sub '${Environment}-recruitment-portal-key-${AWS::AccountId}'

  # EC2 Instance for Ollama
  OllamaInstance:
    Type: AWS::EC2::Instance
    DependsOn: OllamaInstanceProfile
    Properties:
      InstanceType: t3.medium
      ImageId: ami-0c2af51e265bd5e0e  # Updated Amazon Linux 2023 AMI for ap-south-1
      KeyName: !Ref KeyPairName
      SecurityGroupIds:
        - !Ref OllamaSecurityGroup
      SubnetId: !Ref PublicSubnet1
      IamInstanceProfile: !Ref OllamaInstanceProfile
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          yum update -y
          
          # Install Docker
          yum install -y docker
          systemctl start docker
          systemctl enable docker
          usermod -a -G docker ec2-user
          
          # Install Ollama
          curl -fsSL https://ollama.ai/install.sh | sh
          
          # Configure Ollama to listen on all interfaces
          echo 'OLLAMA_HOST=0.0.0.0' >> /etc/environment
          
          # Start Ollama service
          systemctl enable ollama
          systemctl start ollama
          
          # Wait for Ollama to start
          sleep 10
          
          # Pull the specified model
          su - ec2-user -c "OLLAMA_HOST=127.0.0.1:11434 ollama pull ${OllamaModel}"
      Tags:
        - Key: Name
          Value: !Sub '${Environment}-ollama-instance'

Outputs:
  VpcId:
    Description: VPC ID
    Value: !Ref VPC
    Export:
      Name: !Sub '${Environment}-vpc-id'

  DatabaseEndpoint:
    Description: RDS PostgreSQL endpoint
    Value: !GetAtt DatabaseInstance.Endpoint.Address
    Export:
      Name: !Sub '${Environment}-database-endpoint'

  DatabasePort:
    Description: RDS PostgreSQL port
    Value: !GetAtt DatabaseInstance.Endpoint.Port
    Export:
      Name: !Sub '${Environment}-database-port'

  DynamoDBTables:
    Description: DynamoDB table names
    Value: !Sub '${SearchIndexTable},${AnalyticsTable}'
    Export:
      Name: !Sub '${Environment}-dynamodb-tables'

  S3Bucket:
    Description: S3 bucket for resume storage
    Value: !Ref ResumeStorageBucket
    Export:
      Name: !Sub '${Environment}-s3-bucket'

  OllamaEndpoint:
    Description: Ollama EC2 instance endpoint
    Value: !Sub 'http://${OllamaInstance.PublicDnsName}:11434'
    Export:
      Name: !Sub '${Environment}-ollama-endpoint'

  OllamaPublicIP:
    Description: Ollama EC2 instance public IP
    Value: !GetAtt OllamaInstance.PublicIp
    Export:
      Name: !Sub '${Environment}-ollama-public-ip'

  KeyPairName:
    Description: EC2 Key Pair name for SSH access
    Value: !Ref KeyPairName
    Export:
      Name: !Sub '${Environment}-key-pair-name'